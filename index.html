<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f6c645" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Fantasy Space Girls" />
    <title>Fantasy Space Girls</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/icons/icon-180.png" />
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="Fantasy Space Girls playable game"></canvas>

      <section id="intro" class="intro" aria-label="Intro">
        <img src="assets/source_references/primaspacegirls.png" alt="Fantasy Space Girls" />
        <button id="startGameBtn" class="start-game" type="button">START GAME</button>
      </section>

      <section id="select" class="select" aria-label="Choose character">
        <div class="select__panel">
          <h1 class="select-title">Choose Your Hero</h1>
          <div id="characterGrid" class="character-grid"></div>
        </div>
      </section>

      <section class="hud" aria-label="Game status">
        <div class="hud__hero">
          <span id="heroName">Choose a hero</span>
          <small id="heroPower">Hold Right to launch</small>
        </div>
        <div class="hud__score">
          <span id="score">0</span>
          <small>score</small>
        </div>
        <div class="hud__level">
          <span id="level">1</span>
          <small>level</small>
        </div>
        <div class="hud__timer">
          <span id="timer">2:00</span>
          <small>timer</small>
        </div>
      </section>

      <div class="top-menu">
        <button id="menuBtn" class="menu-button" type="button" aria-label="Open menu" aria-expanded="false">☰</button>
        <div id="menuPanel" class="menu-panel is-hidden">
          <button id="pauseBtn" type="button">Pause</button>
          <button id="restartBtn" type="button">Restart</button>
          <button id="mainMenuBtn" type="button">Main Menu</button>
        </div>
      </div>

      <div id="announcement" class="announcement" role="status">Hold Right to charge and release to launch.</div>

      <nav class="touch-controls" aria-label="Touch controls">
        <button id="leftBtn" class="move-control left-control" type="button" aria-label="Move left">
          <img src="assets/ui/left-arrow.png" alt="" />
        </button>
        <button id="rightBtn" class="move-control right-control" type="button" aria-label="Move right">
          <img src="assets/ui/right-arrow.png" alt="" />
        </button>
      </nav>

      <audio id="music" src="assets/audio/backgroundmusic1.mp3" preload="auto" loop></audio>
    </main>
    <script src="src/characters.js"></script>
    <script src="src/game.js"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("service-worker.js");
      }
    </script>
  </body>
</html>
