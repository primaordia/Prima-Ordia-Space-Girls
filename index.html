<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Prima Ordia Prototype</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <main id="app">
      <canvas id="game" aria-label="Prima Ordia playable prototype"></canvas>

      <section id="preIntro" class="pre-intro" aria-label="Open intro">
        <div class="starfield"></div>
        <button id="enterIntroBtn" class="enter-box" type="button">CLICK HERE</button>
      </section>

      <section id="intro" class="intro is-hidden" aria-label="Intro">
        <img src="assets/source_references/intro3.png" alt="Prima Ordia Space Fantasy Adventures" />
        <button id="startGameBtn" class="start-game" type="button">START GAME</button>
      </section>

      <section id="select" class="select" aria-label="Choose character">
        <div class="select__panel">
          <div id="characterGrid" class="character-grid"></div>
        </div>
      </section>

      <section class="hud" aria-label="Game status">
        <div>
          <span id="heroName">Choose a hero</span>
          <small id="heroPower">Pull the slingshot to launch</small>
        </div>
        <div class="hud__score">
          <span id="score">0</span>
          <small>score</small>
        </div>
      </section>

      <div id="announcement" class="announcement" role="status">Click and hold at the launch station to charge.</div>

      <nav class="touch-controls" aria-label="Touch controls">
        <button id="leftBtn" class="move-control" type="button" aria-label="Move left">
          <span class="control-icon">‹</span>
          <span class="control-label">Left</span>
        </button>
        <button id="jumpBtn" class="jump-control" type="button" aria-label="Jump">
          <span class="control-icon">▲</span>
          <span class="control-label">Jump</span>
        </button>
        <button id="rightBtn" class="move-control" type="button" aria-label="Move right">
          <span class="control-label">Right</span>
          <span class="control-icon">›</span>
        </button>
        <button id="backBtn" class="restart-control" type="button" aria-label="Restart and choose character">
          <span class="control-icon">☰</span>
          <span class="control-label">Restart</span>
        </button>
      </nav>

      <audio id="music" src="assets/audio/backgroundmusic1.mp3" preload="auto" loop></audio>
    </main>
    <script src="src/characters.js"></script>
    <script src="src/game.js"></script>
  </body>
</html>
